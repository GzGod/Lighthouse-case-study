<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>灯塔 · 个人 IP 案例</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Noto+Serif+SC:wght@500;700;900&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root{
    --ink:#07080a; --ink-2:#0d0f12; --ink-3:#15181d;
    --bone:#ede8e1; --bone-dim:#a39e96;
    --rule:rgba(237,232,225,0.10); --rule-strong:rgba(237,232,225,0.22);
    --ember:#ff7a45; --ember-soft:#ff9566;
    --teal:#6fb7c1; --amber:#e8b87a;
  }
  html,body{background:var(--ink);color:var(--bone);font-family:"Helvetica Neue","Helvetica","Arial","Noto Sans SC",system-ui,sans-serif;}
  .font-display{font-family:"Helvetica Neue","Helvetica","Arial","Noto Serif SC",serif;font-feature-settings:"ss01";}
  .font-mono{font-family:"JetBrains Mono",ui-monospace,monospace;}
  .font-cn{font-family:"Kaiti SC","STKaiti","KaiTi","楷体","Noto Serif SC",serif;}
  .tnum{font-variant-numeric:tabular-nums;font-feature-settings:"tnum";}
  .kicker{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:0.22em;text-transform:uppercase;color:var(--bone-dim);}
  .rule-t{border-top:1px solid var(--rule);}
  .grid-bg{
    background-image:
      linear-gradient(to right, rgba(237,232,225,0.04) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(237,232,225,0.04) 1px, transparent 1px);
    background-size:80px 80px;
  }
  .ember-glow{text-shadow:0 0 40px rgba(255,122,69,0.35), 0 0 80px rgba(255,122,69,0.18);}
  .reveal{opacity:0;transform:translateY(24px);transition:opacity .9s cubic-bezier(.2,.6,.2,1), transform .9s cubic-bezier(.2,.6,.2,1);}
  .reveal.in{opacity:1;transform:translateY(0);}
  .hairline{height:1px;background:linear-gradient(to right, transparent, var(--rule-strong), transparent);}
  ::selection{background:rgba(255,122,69,0.45);color:#fff;}
  html.lh-preview-edit [data-i18n-key]{cursor:text;border-radius:3px;transition:outline-color .15s ease, background .15s ease;}
  html.lh-preview-edit [data-i18n-key]:hover{outline:1px dashed rgba(255,179,71,.85);background:rgba(255,179,71,.12);}
  .btn-ember{
    background:linear-gradient(180deg, rgba(255,122,69,0.22), rgba(255,122,69,0.08));
    border:1px solid rgba(255,122,69,0.55);
    box-shadow:0 0 30px rgba(255,122,69,0.25), inset 0 1px 0 rgba(255,255,255,0.12);
    color:#ffeee4;
  }
  .btn-bone{background:transparent;border:1px solid var(--rule-strong);color:var(--bone);}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="i18n.jsx"></script>
<script type="text/babel" src="personal-ip.jsx"></script>
</body>
</html>
