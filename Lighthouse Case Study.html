<style>
  :root{
    --ink:#07080a;
    --ink-2:#0d0f12;
    --ink-3:#15181d;
    --bone:#ede8e1;
    --bone-dim:#a39e96;
    --rule:rgba(237,232,225,0.10);
    --rule-strong:rgba(237,232,225,0.22);
    --ember:#ff7a45;
    --ember-soft:#ff9566;
    --teal:#6fb7c1;
    --amber:#e8b87a;
  }
  html,body{background:var(--ink);color:var(--bone);font-family:"Helvetica Neue","Helvetica","Arial","Noto Sans SC",system-ui,sans-serif;}
  .font-display{font-family:"Helvetica Neue","Helvetica","Arial","Noto Serif SC",serif;font-feature-settings:"ss01";}
  .font-mono{font-family:"JetBrains Mono",ui-monospace,monospace;}
  .font-cn{font-family:"Kaiti SC","STKaiti","KaiTi","楷体","Noto Serif SC",serif;}
  .font-cn-serif{font-family:"Kaiti SC","STKaiti","KaiTi","楷体","Noto Serif SC",serif;}
  .tnum{font-variant-numeric:tabular-nums;font-feature-settings:"tnum";}
  .kicker{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:0.22em;text-transform:uppercase;color:var(--bone-dim);}
  .rule-t{border-top:1px solid var(--rule);}
  .rule-b{border-bottom:1px solid var(--rule);}
  .rule-l{border-left:1px solid var(--rule);}
  .grid-bg{
    background-image:
      linear-gradient(to right, rgba(237,232,225,0.04) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(237,232,225,0.04) 1px, transparent 1px);
    background-size:80px 80px;
  }
  .ember-glow{text-shadow:0 0 40px rgba(255,122,69,0.35), 0 0 80px rgba(255,122,69,0.18);}
  .teal-glow{text-shadow:0 0 40px rgba(111,183,193,0.28);}
  .bone-glow{text-shadow:0 0 60px rgba(237,232,225,0.15);}
  .reveal{opacity:0;transform:translateY(24px);transition:opacity .9s cubic-bezier(.2,.6,.2,1), transform .9s cubic-bezier(.2,.6,.2,1);}
  .reveal.in{opacity:1;transform:translateY(0);}
  .reveal-d1{transition-delay:.08s;} .reveal-d2{transition-delay:.16s;} .reveal-d3{transition-delay:.24s;} .reveal-d4{transition-delay:.32s;} .reveal-d5{transition-delay:.4s;}
  .hero-img{background-image:url('assets/hero-arch.png');background-size:cover;background-position:center;}
  .divider-img-1{background-image:url('assets/ember-portal.png');}
  .divider-img-2{background-image:url('assets/dawn-ring.png');}
  .divider-img-3{background-image:url('assets/dune-night.png');}
  .divider-img-4{background-image:url('assets/teal-sunset.png');}
  .vignette-b{background:linear-gradient(to bottom, rgba(7,8,10,0) 0%, rgba(7,8,10,0.2) 45%, rgba(7,8,10,0.85) 85%, var(--ink) 100%);}
  .vignette-t{background:linear-gradient(to top, rgba(7,8,10,0) 0%, rgba(7,8,10,0.2) 45%, rgba(7,8,10,0.85) 85%, var(--ink) 100%);}
  .vignette-all{background:
    radial-gradient(ellipse at center, rgba(7,8,10,0) 0%, rgba(7,8,10,0.35) 60%, rgba(7,8,10,0.9) 100%),
    linear-gradient(to bottom, rgba(7,8,10,0.5), rgba(7,8,10,0.5));}
  .radial-ember{background:radial-gradient(ellipse 70% 55% at 50% 90%, rgba(255,122,69,0.22), transparent 70%);}
  .radial-teal{background:radial-gradient(ellipse 80% 60% at 50% 0%, rgba(111,183,193,0.12), transparent 70%);}
  .ring-soft{box-shadow:inset 0 0 0 1px var(--rule);}
  .stat-card{background:linear-gradient(180deg, rgba(237,232,225,0.03), rgba(237,232,225,0.01));}
  .dot{width:6px;height:6px;border-radius:999px;display:inline-block;}
  .scroll-snap{scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;}
  .scroll-snap>*{scroll-snap-align:start;}
  .ring-lamp{
    position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(circle at 50% 100%, rgba(255,122,69,0.35), transparent 55%);
    mix-blend-mode:screen;
  }
  .hairline{height:1px;background:linear-gradient(to right, transparent, var(--rule-strong), transparent);}
  .tablet-hide{}
  @media (max-width:640px){ .hide-sm{display:none;} }
  /* recharts */
  .recharts-cartesian-axis-tick-value{fill:var(--bone-dim)!important;font-family:"JetBrains Mono",monospace;font-size:11px;}
  .recharts-cartesian-axis-line, .recharts-cartesian-axis-tick-line{stroke:var(--rule-strong);}
  .recharts-cartesian-grid-horizontal line, .recharts-cartesian-grid-vertical line{stroke:var(--rule);}
  .recharts-label{fill:var(--bone-dim);font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.12em;}
  ::selection{background:rgba(255,122,69,0.45);color:#fff;}
  .btn-ember{
    background:linear-gradient(180deg, rgba(255,122,69,0.22), rgba(255,122,69,0.08));
    border:1px solid rgba(255,122,69,0.55);
    box-shadow:0 0 30px rgba(255,122,69,0.25), inset 0 1px 0 rgba(255,255,255,0.12);
    color:#ffeee4;
  }
  .btn-bone{
    background:transparent;
    border:1px solid var(--rule-strong);
    color:var(--bone);
  }
  .logo-mark{
    width:22px;height:22px;position:relative;flex-shrink:0;
  }
  .logo-mark::before,.logo-mark::after{content:"";position:absolute;inset:0;border-radius:999px;}
  .logo-mark::before{background:radial-gradient(circle at 50% 60%, rgba(255,122,69,0.9), rgba(255,122,69,0.0) 65%);}
  .logo-mark::after{border:1.25px solid rgba(237,232,225,0.95);mask:radial-gradient(circle at 50% 120%, #000 48%, transparent 50%);-webkit-mask:radial-gradient(circle at 50% 120%, #000 48%, transparent 50%);}
</style>
